<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Interest Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Simple Interest Calculator</h1>
        
        <div class="form-group">
            <label for="principal">Principal Amount ($):</label>
            <input type="number" id="principal" placeholder="Enter principal amount" min="0" step="0.01">
        </div>

        <div class="form-group">
            <label for="rate">Rate of Interest (% per annum):</label>
            <input type="number" id="rate" placeholder="Enter rate of interest" min="0" step="0.01">
        </div>

        <div class="form-group">
            <label for="time">Time Period (years):</label>
            <input type="number" id="time" placeholder="Enter time period" min="0" step="0.01">
        </div>

        <button onclick="calculateInterest()">Calculate</button>
        <button onclick="resetForm()">Reset</button>

        <div id="result" class="result">
            <div class="result-item">
                <span>Principal Amount:</span>
                <span id="resultPrincipal">$0.00</span>
            </div>
            <div class="result-item">
                <span>Simple Interest:</span>
                <span id="resultInterest">$0.00</span>
            </div>
            <div class="result-item">
                <span>Total Amount:</span>
                <span id="resultTotal">$0.00</span>
            </div>
        </div>
    </div>

    <script>
        function calculateInterest() {
            const principal = parseFloat(document.getElementById('principal').value);
            const rate = parseFloat(document.getElementById('rate').value);
            const time = parseFloat(document.getElementById('time').value);

            if (!principal || !rate || !time) {
                alert('Please fill in all fields');
                return;
            }

            const simpleInterest = (principal * rate * time) / 100;
            const totalAmount = principal + simpleInterest;

            document.getElementById('resultPrincipal').textContent = '$' + principal.toFixed(2);
            document.getElementById('resultInterest').textContent = '$' + simpleInterest.toFixed(2);
            document.getElementById('resultTotal').textContent = '$' + totalAmount.toFixed(2);
        }

        function resetForm() {
            document.getElementById('principal').value = '';
            document.getElementById('rate').value = '';
            document.getElementById('time').value = '';
            document.getElementById('resultPrincipal').textContent = '$0.00';
            document.getElementById('resultInterest').textContent = '$0.00';
            document.getElementById('resultTotal').textContent = '$0.00';
        }

        // Allow Enter key to calculate
        document.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                calculateInterest();
            }
        });
    </script>
</body>
</html>
